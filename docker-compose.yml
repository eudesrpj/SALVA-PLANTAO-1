version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: salva_plantao_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: salva_plantao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salva_network

  # Backend Node.js (comentado - use npm run dev localmente)
  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: salva_plantao_api
  #   environment:
  #     NODE_ENV: development
  #     DATABASE_URL: postgresql://postgres:postgres@postgres:5432/salva_plantao?sslmode=disable
  #     JWT_SECRET: dev_jwt_secret_change_in_production
  #     JWT_REFRESH_SECRET: dev_refresh_secret_change_in_production
  #   ports:
  #     - "5000:5000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - salva_network

volumes:
  postgres_data:

networks:
  salva_network:
    driver: bridge
